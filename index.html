<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Precision Pro + Glass & Battery</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-color: #00ff41; 
            --bg-dark: #0a0c0f; 
            --font-main: 'Courier New', Courier, monospace; 
            --inner-glow: inset 0 0 10px rgba(0, 255, 65, 0.2); 
            
            /* Variáveis do Vidro Fosco (Glassmorphism) */
            --glass-bg: rgba(20, 25, 30, 0.25);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 30%, #1a1e29 0%, var(--bg-dark) 70%);
            font-family: var(--font-main);
            color: white;
            overflow: hidden;
            transition: background 0.5s, font-family 0.3s ease;
            height: 100vh;
        }

        /* CONTAINER PRINCIPAL */
        #widget-container {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body.fullscreen-mode #widget-container {
            top: 50%;
            right: 50%;
            transform: translate(50%, -50%);
            align-items: center;
        }

        /* RELÓGIO */
        #relogio {
            font-size: 3.2rem; 
            font-weight: bold;
            padding: 25px 35px; 
            border-radius: 16px; 
            min-width: 520px; 
            box-sizing: border-box;
            color: var(--accent-color);
            border: 2px solid var(--accent-color); 
            
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), var(--inner-glow);
            
            display: flex; 
            justify-content: center; 
            align-items: baseline; 
            letter-spacing: 1px;
            
            /* CORREÇÃO DO EMPILHAMENTO */
            position: relative;
            z-index: 10; /* Garante que o relógio (e seu menu) fiquem SEMPRE por cima */
            
            transition: color 0.5s, border-color 0.5s, box-shadow 0.5s;
        }

        body.fullscreen-mode #relogio {
            font-size: 5.5rem;
            min-width: 850px;
            padding: 40px;
        }

        #tempo-principal { width: 340px; text-align: right; }
        body.fullscreen-mode #tempo-principal { width: 580px; }
        
        .ms {
            width: 100px;
            text-align: left; 
            font-size: 0.55em; 
            opacity: 0.8;
            margin-left: 5px;
        }

        /* PAINEL DE INFORMAÇÕES */
        #info-panel {
            margin-top: 15px;
            text-align: right;
            
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 16px 0 rgba(0, 0, 0, 0.3);
            
            padding: 15px 20px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.5s ease;
            
            /* CORREÇÃO DO EMPILHAMENTO */
            position: relative;
            z-index: 1; /* Fica abaixo do relógio */
        }

        body.fullscreen-mode #info-panel { text-align: center; }

        #data-extensa { font-size: 1.1rem; color: #ddd; margin-bottom: 12px; text-transform: capitalize; }
        
        #linha-local-clima { 
            display: flex; 
            justify-content: flex-end; 
            gap: 20px; 
            align-items: center; 
        }
        body.fullscreen-mode #linha-local-clima { justify-content: center; }

        #localizacao, #clima, #bateria { 
            font-size: 1.1rem; 
            color: var(--accent-color); 
            font-weight: bold; 
            transition: color 0.5s; 
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* MENU DE CONFIGURAÇÕES */
        #btn-settings {
            position: absolute;
            left: 15px;
            top: 15px;
            background: none;
            border: none;
            color: #888; 
            cursor: pointer;
            opacity: 0.6; 
            transition: all 0.3s ease;
            font-size: 1.2rem;
            padding: 5px;
        }
        
        #relogio:hover #btn-settings { opacity: 1; }
        #btn-settings:hover { color: #fff; transform: scale(1.1) rotate(45deg); }

        #settings-menu {
            position: absolute;
            top: 100%;
            left: 0;
            
            background: rgba(15, 18, 25, 0.95); /* Deixei levemente mais opaco para leitura */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            
            padding: 20px;
            border-radius: 12px;
            z-index: 100; /* Prioridade máxima dentro do relógio */
            display: none; 
            flex-direction: column;
            gap: 15px;
            width: 250px;
        }

        #settings-menu label {
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        #select-font, #select-color {
            background: rgba(0, 0, 0, 0.5);
            color: #eee;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 6px;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            width: 140px;
        }

        input[type="checkbox"] { transform: scale(1.2); }

        #status { margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #444; opacity: 0; transition: opacity 0.5s;}
        body.fullscreen-mode #hint { opacity: 1; }
    </style>
</head>
<body>

    <div id="widget-container">
        <div id="relogio" ondblclick="toggleDeskClock()">
            <button id="btn-settings" title="Configurações">⚙</button>
            
            <div id="settings-menu" onclick="event.stopPropagation()">
                <label>Formato 24h <input type="checkbox" id="check-24h" checked></label>
                <label>Milissegundos <input type="checkbox" id="check-ms" checked></label>
                
                <label>Fonte:
                    <select id="select-font">
                        <option value="'Courier New', Courier, monospace">Terminal</option>
                        <option value="'Orbitron', sans-serif">Tecnológica</option>
                        <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Moderna</option>
                    </select>
                </label>
                
                <label>Modo Manual <input type="checkbox" id="check-manual"></label>
                
                <label id="label-color">Cor:
                    <select id="select-color">
                        <optgroup label="Cores Neon (Brilhantes)">
                            <option value="#00ff41">Neon Green</option>
                            <option value="#00ffff">Cyber Cyan</option>
                            <option value="#ffbf00">Gold</option>
                        </optgroup>
                        <optgroup label="Cores Matte (Escuras)">
                            <option value="#800000">Blood Red</option>
                            <option value="#6A1B9A">Midnight Purple</option>
                            <option value="#000080">Navy Blue</option>
                            <option value="#143306">Abyssal Green</option>
                        </optgroup>
                    </select>
                </label>

                <button onclick="toggleSettings()" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; cursor:pointer; padding:8px; margin-top:10px; border-radius:6px; transition: background 0.3s;">Fechar</button>
            </div>

            <span id="tempo-principal">00:00:00</span><span class="ms" id="ms-display">.000</span>
        </div>
        
        <div id="info-panel">
            <div id="data-extensa">---</div>
            <div id="linha-local-clima">
                <div id="bateria" title="Nível de Bateria"></div> 
                <div id="clima">🌡️ --°C</div>
                <div id="localizacao">📍 Buscando...</div>
            </div>
            <div id="status">Sincronizando...</div>
        </div>
    </div>

    <div id="hint">Pressione ESC ou duplo clique para sair da tela cheia</div>

    <script>
        const displayRelogio = document.getElementById('tempo-principal');
        const displayMs = document.getElementById('ms-display');
        const displayStatus = document.getElementById('status');
        const displayLocal = document.getElementById('localizacao');
        const displayData = document.getElementById('data-extensa');
        const displayClima = document.getElementById('clima');
        const displayBateria = document.getElementById('bateria');
        
        const settingsMenu = document.getElementById('settings-menu');
        const check24h = document.getElementById('check-24h');
        const checkMs = document.getElementById('check-ms');
        const selectFont = document.getElementById('select-font');
        const checkManual = document.getElementById('check-manual');
        const selectColor = document.getElementById('select-color');
        const labelColor = document.getElementById('label-color');

        let offsetGlobal = 0; 

        const darkColors = ["#800000", "#6A1B9A", "#000080", "#143306"];

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : null;
        }

        function aplicarCorEBrilho(hexColor) {
            document.documentElement.style.setProperty('--accent-color', hexColor);
            
            if (darkColors.includes(hexColor.toUpperCase()) || darkColors.includes(hexColor)) {
                document.documentElement.style.setProperty('--inner-glow', 'none');
            } else {
                let rgb = hexToRgb(hexColor);
                document.documentElement.style.setProperty('--inner-glow', `inset 0 0 15px rgba(${rgb}, 0.25)`);
            }
        }

        // --- PREFERÊNCIAS (LOCAL STORAGE) ---
        let config = {
            is24h: localStorage.getItem('is24h') !== 'false', 
            showMs: localStorage.getItem('showMs') !== 'false',
            fontFamily: localStorage.getItem('fontFamily') || "'Courier New', Courier, monospace",
            isManual: localStorage.getItem('isManual') === 'true',
            accentColor: localStorage.getItem('accentColor') || '#00ff41'
        };

        check24h.checked = config.is24h;
        checkMs.checked = config.showMs;
        selectFont.value = config.fontFamily;
        checkManual.checked = config.isManual;
        selectColor.value = config.accentColor;
        document.documentElement.style.setProperty('--font-main', config.fontFamily);
        displayMs.style.display = config.showMs ? 'inline' : 'none';
        labelColor.style.display = config.isManual ? 'flex' : 'none';

        if(config.isManual) aplicarCorEBrilho(config.accentColor);

        check24h.addEventListener('change', (e) => {
            config.is24h = e.target.checked;
            localStorage.setItem('is24h', config.is24h);
        });

        checkMs.addEventListener('change', (e) => {
            config.showMs = e.target.checked;
            localStorage.setItem('showMs', config.showMs);
            displayMs.style.display = config.showMs ? 'inline' : 'none';
        });

        selectFont.addEventListener('change', (e) => {
            config.fontFamily = e.target.value;
            localStorage.setItem('fontFamily', config.fontFamily);
            document.documentElement.style.setProperty('--font-main', config.fontFamily);
        });

        checkManual.addEventListener('change', (e) => {
            config.isManual = e.target.checked;
            localStorage.setItem('isManual', config.isManual);
            labelColor.style.display = config.isManual ? 'flex' : 'none';
            if(config.isManual) aplicarCorEBrilho(config.accentColor);
        });

        selectColor.addEventListener('change', (e) => {
            config.accentColor = e.target.value;
            localStorage.setItem('accentColor', config.accentColor);
            if(config.isManual) aplicarCorEBrilho(config.accentColor);
        });

        function toggleSettings() {
            settingsMenu.style.display = (settingsMenu.style.display === 'flex') ? 'none' : 'flex';
        }
        
        document.getElementById('btn-settings').addEventListener('click', (e) => {
            e.stopPropagation(); 
            toggleSettings();
        });

        // --- SISTEMA DE BATERIA ---
        async function iniciarBateria() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    
                    function atualizarBateria() {
                        const nivel = Math.round(battery.level * 100);
                        let icone = "🔋";
                        
                        if (battery.charging) icone = "⚡";
                        else if (nivel <= 20) icone = "🪫";
                        else if (nivel <= 50) icone = "🔋";

                        displayBateria.textContent = `${icone} ${nivel}%`;
                        
                        if (battery.charging) displayBateria.style.color = "#4caf50";
                        else if (nivel <= 20) displayBateria.style.color = "#ff5252";
                        else displayBateria.style.color = "var(--accent-color)";
                    }

                    atualizarBateria();
                    battery.addEventListener('levelchange', atualizarBateria);
                    battery.addEventListener('chargingchange', atualizarBateria);
                } catch (e) {
                    displayBateria.style.display = 'none'; 
                }
            } else {
                displayBateria.style.display = 'none'; 
            }
        }

        // --- LOCALIZAÇÃO E CLIMA ---
        async function buscarPosicaoEClima() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (posicao) => {
                    const { latitude, longitude } = posicao.coords;
                    try {
                        const resLoc = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
                        const dataLoc = await resLoc.json();
                        displayLocal.textContent = `📍 ${dataLoc.address.city || dataLoc.address.town || "Petrolina"}`;
                        
                        const resClima = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const dataClima = await resClima.json();
                        const temp = Math.round(dataClima.current_weather.temperature);
                        
                        let emoji = "☀️";
                        const code = dataClima.current_weather.weathercode;
                        if (code > 0 && code <= 3) emoji = "🌤️";
                        else if (code >= 45 && code <= 48) emoji = "🌫️";
                        else if (code >= 51 && code <= 67) emoji = "🌧️";
                        else if (code >= 71) emoji = "❄️";

                        displayClima.textContent = `${emoji} ${temp}°C`;
                    } catch (e) { console.log("Erro API Geolocation"); }
                });
            }
        }

        // --- SINCRONIZAÇÃO DE HORA ---
        async function sincronizarHora() {
            try {
                const response = await fetch(`https://worldtimeapi.org/api/timezone/America/Recife?nocache=${Date.now()}`);
                const data = await response.json();
                offsetGlobal = new Date(data.datetime).getTime() - new Date().getTime();
                displayStatus.textContent = "✓ Sincronizado";
                displayStatus.style.color = "#4caf50";
            } catch (e) {
                displayStatus.textContent = "⚠ Hora Local";
                displayStatus.style.color = "#888"; 
            }
        }

        // --- CORES DINÂMICAS AUTOMÁTICAS ---
        function atualizarTons(hora) {
            let cor = (hora >= 6 && hora < 12) ? "#00995D" : (hora >= 12 && hora < 18) ? "#689f38" : (hora >= 18 && hora < 24) ? "#00ff41" : "#1b5e20";
            aplicarCorEBrilho(cor);
        }

        // --- LOOP DO RELÓGIO ---
        function rodarRelogio() {
            const agora = new Date(Date.now() + offsetGlobal);
            let h = agora.getHours();
            const m = String(agora.getMinutes()).padStart(2, '0');
            const s = String(agora.getSeconds()).padStart(2, '0');
            const ms = String(agora.getMilliseconds()).padStart(3, '0');

            if(!config.isManual) {
                atualizarTons(h);
            }

            let ampm = "";
            if (!config.is24h) {
                ampm = h >= 12 ? " PM" : " AM";
                h = h % 12 || 12;
            }

            const formatHora = String(h).padStart(2, '0');
            displayRelogio.textContent = `${formatHora}:${m}:${s}${ampm}`;
            displayMs.textContent = `.${ms}`;

            const opcoesData = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            displayData.textContent = agora.toLocaleDateString('pt-BR', opcoesData);

            requestAnimationFrame(rodarRelogio);
        }

        // FULLSCREEN
        function toggleDeskClock() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
                document.body.classList.add('fullscreen-mode');
            } else {
                document.exitFullscreen();
            }
        }
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) document.body.classList.remove('fullscreen-mode');
        });

        // INICIALIZAÇÃO GERAL
        iniciarBateria();
        rodarRelogio();
        buscarPosicaoEClima();
        sincronizarHora();
        setInterval(buscarPosicaoEClima, 900000);
        setInterval(sincronizarHora, 600000);
    </script>
</body>
</html>
