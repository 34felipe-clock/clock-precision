<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Command Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #00ff41; 
            --bg-dark: #0a0c0f; 
            --font-main: 'Courier New', Courier, monospace; 
            --glass-bg: rgba(20, 25, 30, 0.6);
            --glass-blur: blur(20px);
            --inner-glow: inset 0 0 15px rgba(0, 255, 65, 0.2);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 30%, #1a1e29 0%, var(--bg-dark) 70%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* CONTAINER CENTRAL */
        #widget-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            width: 95%;
            max-width: 650px;
        }

        #relogio {
            font-family: var(--font-main);
            font-size: 3.5rem; 
            font-weight: bold;
            padding: 30px; 
            border-radius: 20px; 
            width: 100%;
            box-sizing: border-box;
            color: var(--accent-color);
            border: 2px solid var(--accent-color); 
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), var(--inner-glow);
            display: flex; justify-content: center; align-items: baseline;
            position: relative;
        }

        /* HUB DE ATALHOS COM TEXTO ABAIXO */
        #shortcuts-hub {
            display: flex;
            gap: 25px;
            margin-top: -10px;
            margin-bottom: 20px;
            z-index: 6;
        }
        
        .shortcut-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            gap: 8px;
            cursor: pointer;
        }

        .shortcut-icon {
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.3s;
            color: white; font-size: 1.2rem;
            backdrop-filter: blur(5px);
            font-weight: bold;
        }
        
        .shortcut-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            transition: color 0.3s;
        }

        .shortcut-wrapper:hover .shortcut-icon { 
            border-color: var(--accent-color); 
            transform: translateY(-5px);
            box-shadow: 0 0 15px var(--accent-color);
            color: var(--accent-color);
        }
        .shortcut-wrapper:hover .shortcut-label { color: var(--accent-color); }
        .shortcut-icon svg { width: 22px; height: 22px; fill: white; transition: fill 0.3s; }
        .shortcut-wrapper:hover .shortcut-icon svg { fill: var(--accent-color); }

        /* PAINEL DE INFO */
        #info-panel {
            margin-top: 15px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .row-center { display: flex; justify-content: center; gap: 20px; font-weight: bold; color: var(--accent-color); margin-bottom: 15px; }
        
        /* BARRA FINANCEIRA FLEXÍVEL */
        #finance-bar {
            display: flex; 
            justify-content: space-around; 
            flex-wrap: wrap;
            padding: 12px; 
            background: rgba(0,0,0,0.3);
            border-radius: 10px; 
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            gap: 10px;
        }
        .finance-item { text-align: center; }
        .finance-item span { color: #888; display: block; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 3px; font-weight: bold; letter-spacing: 1px; }
        .finance-item b { font-size: 0.85rem; color: #fff; }

        /* RELÓGIO MUNDIAL */
        #world-clocks {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px; gap: 10px;
        }
        .city-select {
            background: transparent; border: none; color: #888;
            font-size: 0.65rem; text-transform: uppercase; cursor: pointer;
            font-family: inherit; outline: none; margin-bottom: 5px;
            text-align-last: center; transition: color 0.3s;
        }
        .city-select:hover { color: white; }
        .city-time { font-size: 1.1rem; color: var(--accent-color); font-weight: bold; text-align: center; }

        /* SIDEBAR DE NOTAS */
        #notes-sidebar {
            position: fixed; right: -320px; top: 0;
            width: 300px; height: 100vh;
            background: rgba(10, 12, 15, 0.95);
            backdrop-filter: blur(30px);
            border-left: 2px solid var(--accent-color);
            transition: right 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 1000; padding: 25px; box-sizing: border-box;
        }
        #notes-sidebar.active { right: 0; }
        #notes-trigger {
            position: fixed; right: 0; top: 50%;
            transform: translateY(-50%);
            background: var(--accent-color); color: black;
            padding: 20px 8px; border-radius: 12px 0 0 12px;
            cursor: pointer; font-weight: bold; font-size: 0.75rem;
            writing-mode: vertical-rl; z-index: 1001;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }
        #notes-area {
            width: 100%; height: 85%; background: transparent;
            border: none; color: #eee; font-family: 'Inter', sans-serif;
            resize: none; outline: none; font-size: 1rem; line-height: 1.6;
        }

        /* MENU SETTINGS */
        #settings-menu {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #161a22; border: 2px solid var(--accent-color);
            padding: 25px; border-radius: 15px; z-index: 10000;
            display: none; flex-direction: column; gap: 15px; width: 280px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        #btn-settings { position: absolute; left: 15px; top: 15px; background: none; border: none; color: #555; cursor: pointer; font-size: 1.3rem; transition: color 0.3s; }
        #btn-settings:hover { color: white; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #ff5252; margin-right: 5px; }
        .status-online { background: #4caf50; box-shadow: 0 0 10px #4caf50; }

        @media (max-width: 600px) {
            #relogio { font-size: 2.2rem; }
            #world-clocks { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="notes-trigger" onclick="toggleNotes()">BLOCO DE NOTAS</div>
    <div id="notes-sidebar">
        <h3 style="color: var(--accent-color); margin-top:0; letter-spacing: 1px;">NOTAS RÁPIDAS</h3>
        <textarea id="notes-area" placeholder="Suas anotações ficam salvas aqui automaticamente..."></textarea>
        <button onclick="toggleNotes()" style="background:var(--accent-color); color:black; border:none; cursor:pointer; width:100%; padding:12px; border-radius:8px; font-weight:bold;">FECHAR</button>
    </div>

    <div id="widget-container">
        
        <div id="shortcuts-hub">
            <a href="https://google.com" target="_blank" class="shortcut-wrapper">
                <div class="shortcut-icon">G</div>
                <span class="shortcut-label">Google</span>
            </a>
            
            <a href="https://youtube.com" target="_blank" class="shortcut-wrapper">
                <div class="shortcut-icon">Y</div>
                <span class="shortcut-label">YouTube</span>
            </a>
            
            <a href="https://web.whatsapp.com" target="_blank" class="shortcut-wrapper">
                <div class="shortcut-icon">W</div>
                <span class="shortcut-label">WhatsApp</span>
            </a>
            
            <a href="https://gemini.google.com" target="_blank" class="shortcut-wrapper">
                <div class="shortcut-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11 2H13V6H11V2ZM11 18H13V22H11V18ZM2 11V13H6V11H2ZM18 11V13H22V11H18ZM11 11H13V13H11V11ZM3.75 3.75L5.25 5.25L5.25 3.75L3.75 3.75ZM20.25 20.25L18.75 18.75L18.75 20.25L20.25 20.25ZM3.75 20.25L5.25 18.75L3.75 18.75L3.75 20.25ZM20.25 3.75L18.75 5.25L20.25 5.25L20.25 3.75Z"/>
                    </svg>
                </div>
                <span class="shortcut-label">Gemini</span>
            </a>
        </div>

        <div id="relogio">
            <button id="btn-settings" onclick="toggleSettings()">⚙</button>
            <span id="tempo-principal">00:00:00</span><span style="font-size:0.5em; margin-left:5px; opacity:0.7;" id="ms-display">.000</span>
        </div>
        
        <div id="info-panel">
            <div id="data-extensa" style="font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; text-transform: capitalize;">---</div>
            
            <div id="finance-bar">
                <div class="finance-item"><span>USD</span> <b id="val-usd">R$ --</b></div>
                <div class="finance-item"><span>EUR</span> <b id="val-eur">R$ --</b></div>
                <div class="finance-item"><span>GBP</span> <b id="val-gbp">R$ --</b></div>
                <div class="finance-item"><span>BRL</span> <b id="val-brl">US$ --</b></div>
                <div class="finance-item"><span>BTC</span> <b id="val-btc">K$ --</b></div>
            </div>

            <div class="row-center">
                <div id="bateria">🔋 --%</div>
                <div id="clima">🌤️ --°C</div>
                <div id="localizacao">📍 Buscando...</div>
            </div>

            <div id="world-clocks">
                <div class="city-clock">
                    <select class="city-select" id="tz-1"></select>
                    <div class="city-time" id="time-1">00:00</div>
                </div>
                <div class="city-clock">
                    <select class="city-select" id="tz-2"></select>
                    <div class="city-time" id="time-2">00:00</div>
                </div>
                <div class="city-clock">
                    <select class="city-select" id="tz-3"></select>
                    <div class="city-time" id="time-3">00:00</div>
                </div>
            </div>

            <div style="margin-top: 20px; font-size: 0.65rem; color: #444; display: flex; justify-content: center; gap: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
                <div><span id="net-dot" class="status-dot"></span> <span id="net-status">OFFLINE</span></div>
                <div>IP: <span id="ip-address" style="color:#666">---.---.---.---</span></div>
            </div>
        </div>
    </div>

    <div id="settings-menu">
        <label>Formato 24h <input type="checkbox" id="check-24h"></label>
        <label>Milissegundos <input type="checkbox" id="check-ms"></label>
        <label>Modo Manual <input type="checkbox" id="check-manual"></label>
        <label>Cor:
            <select id="select-color" style="background:#000; color:white; padding:5px; border-radius:4px;">
                <option value="#00ff41">Neon Green</option>
                <option value="#00ffff">Cyber Cyan</option>
                <option value="#ffbf00">Gold</option>
                <option value="#ff00ff">Pink Neon</option>
                <option value="#6A1B9A">Deep Purple</option>
            </select>
        </label>
        <button onclick="toggleSettings()" style="margin-top:10px; cursor:pointer; background:#333; color:white; border:none; padding:10px; border-radius:5px;">FECHAR</button>
    </div>

    <script>
        let offsetGlobal = 0;
        const config = {
            is24h: localStorage.getItem('is24h') !== 'false',
            showMs: localStorage.getItem('showMs') !== 'false',
            isManual: localStorage.getItem('isManual') === 'true',
            accentColor: localStorage.getItem('accentColor') || '#00ff41',
            tz: [localStorage.getItem('tz1') || 'America/New_York', localStorage.getItem('tz2') || 'Europe/London', localStorage.getItem('tz3') || 'Asia/Tokyo']
        };

        const zones = [
            { n: "Nova York", v: "America/New_York" }, { n: "Londres", v: "Europe/London" },
            { n: "Tóquio", v: "Asia/Tokyo" }, { n: "São Paulo", v: "America/Sao_Paulo" },
            { n: "Dubai", v: "Asia/Dubai" }, { n: "Hong Kong", v: "Asia/Hong_Kong" },
            { n: "Los Angeles", v: "America/Los_Angeles" }, { n: "Berlim", v: "Europe/Berlin" }
        ];

        function init() {
            [1,2,3].forEach(i => {
                const sel = document.getElementById(`tz-${i}`);
                zones.forEach(z => sel.add(new Option("▼ " + z.n.toUpperCase(), z.v)));
                sel.value = config.tz[i-1];
                sel.onchange = (e) => { localStorage.setItem(`tz${i}`, e.target.value); config.tz[i-1] = e.target.value; };
            });

            // Restaura os valores do menu no HTML
            document.getElementById('check-24h').checked = config.is24h;
            document.getElementById('check-ms').checked = config.showMs;
            document.getElementById('check-manual').checked = config.isManual;
            document.getElementById('select-color').value = config.accentColor;
            document.getElementById('notes-area').value = localStorage.getItem('user_notes') || '';
            
            // Reativando os "ouvintes" do Menu de Configurações
            document.getElementById('check-24h').addEventListener('change', (e) => { 
                config.is24h = e.target.checked; localStorage.setItem('is24h', config.is24h); 
            });
            document.getElementById('check-ms').addEventListener('change', (e) => { 
                config.showMs = e.target.checked; localStorage.setItem('showMs', config.showMs); 
            });
            document.getElementById('check-manual').addEventListener('change', (e) => { 
                config.isManual = e.target.checked; localStorage.setItem('isManual', config.isManual); 
                if(config.isManual) aplicarCor(config.accentColor);
            });
            document.getElementById('select-color').addEventListener('change', (e) => { 
                config.accentColor = e.target.value; localStorage.setItem('accentColor', config.accentColor); 
                if(config.isManual) aplicarCor(config.accentColor);
            });

            aplicarCor(config.accentColor);
            
            sincronizar();
            iniciarBateria();
            buscarPosicaoEClima();
            fetchFinance();
            fetchIP();
            checkNet();
            rodar(); 
        }

        function aplicarCor(c) {
            document.documentElement.style.setProperty('--accent-color', c);
            document.documentElement.style.setProperty('--inner-glow', `inset 0 0 15px ${c}33`);
        }

        function toggleNotes() { document.getElementById('notes-sidebar').classList.toggle('active'); }
        function toggleSettings() { const s = document.getElementById('settings-menu'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }

        document.getElementById('notes-area').oninput = (e) => localStorage.setItem('user_notes', e.target.value);

        async function fetchFinance() {
            try {
                const r = await fetch('https://economia.awesomeapi.com.br/last/USD-BRL,EUR-BRL,GBP-BRL,BTC-USD,BRL-USD');
                const d = await r.json();
                document.getElementById('val-usd').textContent = `R$ ${parseFloat(d.USDBRL.bid).toFixed(2)}`;
                document.getElementById('val-eur').textContent = `R$ ${parseFloat(d.EURBRL.bid).toFixed(2)}`;
                document.getElementById('val-gbp').textContent = `R$ ${parseFloat(d.GBPBRL.bid).toFixed(2)}`;
                document.getElementById('val-brl').textContent = `$ ${parseFloat(d.BRLUSD.bid).toFixed(2)}`;
                document.getElementById('val-btc').textContent = `K$ ${Math.round(d.BTCUSD.bid/1000)}`;
            } catch(e) { console.log("Erro Finance API"); }
        }

        async function fetchIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                document.getElementById('ip-address').textContent = d.ip;
            } catch(e) {}
        }

        function checkNet() {
            const dot = document.getElementById('net-dot');
            const status = document.getElementById('net-status');
            if(navigator.onLine) {
                dot.classList.add('status-online');
                status.textContent = "CONECTADO";
            } else {
                dot.classList.remove('status-online');
                status.textContent = "OFFLINE";
            }
        }
        window.addEventListener('online', checkNet);
        window.addEventListener('offline', checkNet);

        function rodar() {
            const agora = new Date(Date.now() + offsetGlobal);
            let h = agora.getHours();
            const m = String(agora.getMinutes()).padStart(2, '0');
            const s = String(agora.getSeconds()).padStart(2, '0');
            const ms = String(agora.getMilliseconds()).padStart(3, '0');

            if(!config.isManual) {
                const c = h >= 18 || h < 6 ? '#00ff41' : '#ffbf00';
                aplicarCor(c);
            }

            const hDisplay = config.is24h ? String(h).padStart(2, '0') : (h % 12 || 12);
            document.getElementById('tempo-principal').textContent = `${hDisplay}:${m}:${s}`;
            document.getElementById('ms-display').textContent = `.${ms}`;
            document.getElementById('ms-display').style.visibility = config.showMs ? 'visible' : 'hidden';
            
            const opcoesData = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('data-extensa').textContent = agora.toLocaleDateString('pt-BR', opcoesData);

            [1,2,3].forEach(i => {
                document.getElementById(`time-${i}`).textContent = new Intl.DateTimeFormat('pt-BR', {
                    hour:'2-digit', minute:'2-digit', timeZone: config.tz[i-1], hour12: !config.is24h
                }).format(agora);
            });

            requestAnimationFrame(rodar);
        }

        async function sincronizar() {
            try {
                const r = await fetch('https://worldtimeapi.org/api/timezone/America/Recife');
                const d = await r.json();
                offsetGlobal = new Date(d.datetime).getTime() - Date.now();
            } catch(e) {}
        }

        async function iniciarBateria() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const update = () => {
                        const n = Math.round(battery.level * 100);
                        const el = document.getElementById('bateria');
                        el.textContent = `${battery.charging ? '⚡' : '🔋'} ${n}%`;
                        if(battery.charging) el.style.color = "#4caf50";
                        else if(n <= 20) el.style.color = "#ff5252";
                        else el.style.color = "var(--accent-color)";
                    };
                    update();
                    battery.addEventListener('levelchange', update);
                    battery.addEventListener('chargingchange', update);
                } catch(e) { document.getElementById('bateria').style.display = 'none'; }
            } else {
                document.getElementById('bateria').style.display = 'none';
            }
        }

        async function buscarPosicaoEClima() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const resLoc = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
                        const dLoc = await resLoc.json();
                        document.getElementById('localizacao').textContent = `📍 ${dLoc.address.city || dLoc.address.town || "Petrolina"}`;
                        const resCl = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const dCl = await resCl.json();
                        document.getElementById('clima').textContent = `🌤️ ${Math.round(dCl.current_weather.temperature)}°C`;
                    } catch (e) {}
                });
            }
        }

        init();
        
        setInterval(fetchFinance, 60000); 
        setInterval(sincronizar, 600000);
        setInterval(buscarPosicaoEClima, 900000);
    </script>
</body>
</html>
