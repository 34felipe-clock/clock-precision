<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Precision Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-color: #00ff41; 
            --bg-dark: #0a0c0f; 
            --font-main: 'Courier New', Courier, monospace; 
            --glass-bg: rgba(20, 25, 30, 0.4);
            --glass-blur: blur(15px);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 30%, #1a1e29 0%, var(--bg-dark) 70%);
            font-family: var(--font-main);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* AJUSTE AQUI: Centralizando o container perfeitamente na tela */
        #widget-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center; /* Alinha o relógio e o painel no centro */
            z-index: 5;
            width: 95%; /* Adapta à largura da tela */
            max-width: 550px; /* Impede que fique gigante no PC */
        }

        #relogio {
            font-size: 3.2rem; 
            font-weight: bold;
            padding: 25px 35px; 
            border-radius: 16px; 
            width: 100%; /* Ocupa 100% do container */
            box-sizing: border-box;
            color: var(--accent-color);
            border: 2px solid var(--accent-color); 
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: baseline;
            position: relative;
        }

        #info-panel {
            margin-top: 15px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            z-index: 1;
            text-align: center; /* Centraliza o texto do painel */
        }

        #data-extensa { color:#ccc; margin-bottom:10px; text-transform: capitalize; font-size: 1.1rem; }

        /* Centraliza a linha de ícones de informações */
        #linha-local-clima { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            font-weight: bold; 
            color: var(--accent-color); 
            flex-wrap: wrap; /* Permite quebrar a linha se a tela for muito pequena */
        }

        /* MENU FLUTUANTE CENTRALIZADO */
        #settings-menu {
            position: fixed; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #161a22;
            border: 2px solid var(--accent-color);
            padding: 20px;
            border-radius: 12px;
            z-index: 9999; 
            display: none; 
            flex-direction: column;
            gap: 15px;
            width: 260px;
            max-width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,1);
        }

        #btn-settings {
            position: absolute; left: 15px; top: 15px;
            background: none; border: none; color: #888; 
            cursor: pointer; font-size: 1.2rem; z-index: 10;
        }
        
        #settings-menu label { font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        select { background: #000; color: #eee; border: 1px solid #555; padding: 5px; }
        .ms { font-size: 0.55em; opacity: 0.8; margin-left: 5px; }

        /* RESPONSIVIDADE PARA CELULARES */
        @media (max-width: 600px) {
            #relogio {
                font-size: 2.2rem; /* Reduz a fonte no celular */
                padding: 20px 10px;
            }
            #data-extensa { font-size: 0.9rem; }
            #linha-local-clima { font-size: 0.9rem; gap: 10px; }
            #btn-settings { left: 10px; top: 10px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="widget-container">
        <div id="relogio">
            <button id="btn-settings" onclick="toggleSettings()">⚙</button>
            <span id="tempo-principal">00:00:00</span><span class="ms" id="ms-display">.000</span>
        </div>
        
        <div id="info-panel">
            <div id="data-extensa">---</div>
            <div id="linha-local-clima">
                <div id="bateria">🔋 --%</div>
                <div id="clima">🌤️ --°C</div>
                <div id="localizacao">📍 Buscando...</div>
            </div>
            <div id="status" style="margin-top: 10px; font-size: 0.7rem; color: #555; text-transform: uppercase;">Sincronizando...</div>
        </div>
    </div>

    <div id="settings-menu">
        <label>Formato 24h <input type="checkbox" id="check-24h" checked></label>
        <label>Milissegundos <input type="checkbox" id="check-ms" checked></label>
        <label>Modo Manual <input type="checkbox" id="check-manual"></label>
        <label>Cor:
            <select id="select-color">
                <option value="#00ff41">Neon Green</option>
                <option value="#00ffff">Cyber Cyan</option>
                <option value="#6A1B9A">Deep Purple</option>
                <option value="#800000">Blood Red</option>
            </select>
        </label>
        <label>Fonte:
            <select id="select-font">
                <option value="'Courier New', Courier, monospace">Terminal</option>
                <option value="'Orbitron', sans-serif">Tecnológica</option>
                <option value="'Segoe UI', sans-serif">Moderna</option>
            </select>
        </label>
        <button onclick="toggleSettings()" style="margin-top:10px; cursor:pointer; background:#333; color:white; border:none; padding:8px; border-radius:5px;">Fechar</button>
    </div>

    <script>
        const displayStatus = document.getElementById('status');
        let offsetGlobal = 0; 
        const darkColors = ["#800000", "#6A1B9A"];

        function aplicarCorEBrilho(hexColor) {
            document.documentElement.style.setProperty('--accent-color', hexColor);
            document.documentElement.style.setProperty('--inner-glow', darkColors.includes(hexColor.toUpperCase()) ? 'none' : 'inset 0 0 15px rgba(0,255,65,0.2)');
        }

        let config = {
            is24h: localStorage.getItem('is24h') !== 'false', 
            showMs: localStorage.getItem('showMs') !== 'false',
            fontFamily: localStorage.getItem('fontFamily') || "'Courier New', Courier, monospace",
            isManual: localStorage.getItem('isManual') === 'true',
            accentColor: localStorage.getItem('accentColor') || '#00ff41'
        };

        document.getElementById('check-24h').checked = config.is24h;
        document.getElementById('check-ms').checked = config.showMs;
        document.getElementById('select-font').value = config.fontFamily;
        document.getElementById('check-manual').checked = config.isManual;
        document.getElementById('select-color').value = config.accentColor;
        document.documentElement.style.setProperty('--font-main', config.fontFamily);
        
        if(config.isManual) aplicarCorEBrilho(config.accentColor);

        document.getElementById('check-24h').addEventListener('change', (e) => { config.is24h = e.target.checked; localStorage.setItem('is24h', config.is24h); });
        document.getElementById('check-ms').addEventListener('change', (e) => { config.showMs = e.target.checked; localStorage.setItem('showMs', config.showMs); });
        document.getElementById('select-font').addEventListener('change', (e) => { config.fontFamily = e.target.value; localStorage.setItem('fontFamily', config.fontFamily); document.documentElement.style.setProperty('--font-main', config.fontFamily); });
        document.getElementById('check-manual').addEventListener('change', (e) => { config.isManual = e.target.checked; localStorage.setItem('isManual', config.isManual); if(config.isManual) aplicarCorEBrilho(config.accentColor); });
        document.getElementById('select-color').addEventListener('change', (e) => { config.accentColor = e.target.value; localStorage.setItem('accentColor', config.accentColor); if(config.isManual) aplicarCorEBrilho(config.accentColor); });

        function toggleSettings() {
            const menu = document.getElementById('settings-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        async function sincronizarHora() {
            try {
                const res = await fetch(`https://worldtimeapi.org/api/timezone/America/Recife?nocache=${Date.now()}`);
                const data = await res.json();
                offsetGlobal = new Date(data.datetime).getTime() - new Date().getTime();
                displayStatus.textContent = "✓ Sincronizado";
                displayStatus.style.color = "#4caf50";
            } catch (e) { displayStatus.textContent = "⚠ Hora Local"; }
        }

        function rodarRelogio() {
            const agora = new Date(Date.now() + offsetGlobal);
            let h = agora.getHours();
            const m = String(agora.getMinutes()).padStart(2, '0');
            const s = String(agora.getSeconds()).padStart(2, '0');
            const ms = String(agora.getMilliseconds()).padStart(3, '0');
            
            if(!config.isManual) {
                let cor = (h >= 6 && h < 12) ? "#00995D" : (h >= 12 && h < 18) ? "#689f38" : (h >= 18 && h < 24) ? "#00ff41" : "#1b5e20";
                aplicarCorEBrilho(cor);
            }

            let ampm = "";
            if (!config.is24h) {
                ampm = h >= 12 ? " PM" : " AM";
                h = h % 12 || 12;
            }

            document.getElementById('tempo-principal').textContent = `${String(h).padStart(2, '0')}:${m}:${s}${ampm}`;
            document.getElementById('ms-display').textContent = `.${ms}`;
            document.getElementById('ms-display').style.display = config.showMs ? 'inline' : 'none';
            document.getElementById('data-extensa').textContent = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            
            requestAnimationFrame(rodarRelogio);
        }

        async function iniciarBateria() {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                const update = () => {
                    const n = Math.round(battery.level * 100);
                    document.getElementById('bateria').textContent = `${battery.charging ? '⚡' : '🔋'} ${n}%`;
                };
                update();
                battery.addEventListener('levelchange', update);
                battery.addEventListener('chargingchange', update);
            } else {
                document.getElementById('bateria').style.display = 'none';
            }
        }

        async function buscarPosicaoEClima() {
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    try {
                        const resLoc = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
                        const dLoc = await resLoc.json();
                        document.getElementById('localizacao').textContent = `📍 ${dLoc.address.city || dLoc.address.town || "Petrolina"}`;
                        const resCl = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const dCl = await resCl.json();
                        document.getElementById('clima').textContent = `🌤️ ${Math.round(dCl.current_weather.temperature)}°C`;
                    } catch (e) {}
                });
            }
        }

        iniciarBateria(); 
        sincronizarHora();
        buscarPosicaoEClima(); 
        rodarRelogio();
        
        setInterval(buscarPosicaoEClima, 900000); 
        setInterval(sincronizarHora, 600000);
    </script>
</body>
</html>
